name: Update STI-SMID Signal Monitor

on:
  schedule:
    # Run at 6:30 PM SGT (10:30 UTC) on weekdays — after SGX close
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run pipeline
        run: python scripts/pipeline.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update signal: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
